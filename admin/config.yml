backend:
  name: github
  repo: jmamorteg/raquelneriz.com
  branch: main
  base_url: https://staticcmsrn.jmamorteg.workers.dev
  auth_endpoint: auth
  cms_label: "Static CMS"

publish_mode: simple
media_folder: "assets/img/uploads"
public_folder: "/assets/img/uploads"
locale: es

collections:
  - name: posts
    label: Entradas
    label_singular: Entrada
    folder: "_posts"
    create: true
    extension: "markdown"
    format: frontmatter
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Título", name: title, widget: string }
      - { label: "Fecha", name: date, widget: datetime, format: "YYYY-MM-DD HH:mm:ss ZZ" }
      - { label: "Categorías", name: categories, widget: list }
      - { label: "Tags", name: tags, widget: list }
      - { label: "Contenido", name: body, widget: markdown }

  - name: pages_root
    label: Páginas (raíz)
    files:
      - label: Sobre mí (raíz)
        name: about_root
        file: "about.markdown"
        fields:
          - { label: Layout, name: layout, widget: hidden, default: default }
          - { label: Título, name: title, widget: string }
          - { label: Lang, name: lang, widget: hidden, default: es }
          - { label: Permalink, name: permalink, widget: hidden, default: "/about/" }
          - { label: Contenido, name: body, widget: markdown }
      - label: Blog (raíz)
        name: blog_root
        file: "blog.markdown"
        fields:
          - { label: Layout, name: layout, widget: hidden, default: default }
          - { label: Título, name: title, widget: string }
          - { label: Lang, name: lang, widget: hidden, default: es }
          - { label: Permalink, name: permalink, widget: hidden, default: "/blog/" }
          - { label: Contenido, name: body, widget: markdown }
      - label: Contacto (raíz)
        name: contact_root
        file: "contact.markdown"
        fields:
          - { label: Layout, name: layout, widget: hidden, default: default }
          - { label: Título, name: title, widget: string }
          - { label: Lang, name: lang, widget: hidden, default: es }
          - { label: Permalink, name: permalink, widget: hidden, default: "/contact/" }
          - { label: Contenido, name: body, widget: markdown }
      - label: Portfolio (raíz)
        name: portfolio_root
        file: "portfolio.markdown"
        fields:
          - { label: Layout, name: layout, widget: hidden, default: default }
          - { label: Título, name: title, widget: string }
          - { label: Lang, name: lang, widget: hidden, default: es }
          - { label: Permalink, name: permalink, widget: hidden, default: "/portfolio/" }
          - { label: Contenido, name: body, widget: markdown }
      - label: Líneas de trabajo (raíz)
        name: servicios_root
        file: "servicios.markdown"
        fields:
          - { label: Layout, name: layout, widget: hidden, default: default }
          - { label: Título, name: title, widget: string }
          - { label: Lang, name: lang, widget: hidden, default: es }
          - { label: Permalink, name: permalink, widget: hidden, default: "/servicios/" }
          - { label: Contenido, name: body, widget: markdown }
      - label: Taller Kintsugi (raíz)
        name: kintsugi_root
        file: "taller-kintsugi.markdown"
        fields:
          - { label: Layout, name: layout, widget: hidden, default: default }
          - { label: Título, name: title, widget: string }
          - { label: Lang, name: lang, widget: hidden, default: es }
          - { label: Permalink, name: permalink, widget: hidden, default: "/taller-kintsugi/" }
          - { label: Contenido, name: body, widget: markdown }

