  - name: data_portfolio
    label: Datos de portfolio
    files:
      - label: Secciones de portfolio
        name: portfolio_json
        file: "_data/portfolio.json"
        description: "Lista de secciones e items del portfolio"
        fields:
          - label: Secciones
            name: sections
            widget: list
            summary: "{{title}} ({{id}})"
            fields:
              - { label: ID, name: id, widget: string }
              - { label: Título, name: title, widget: string }
              - label: Items
                name: items
                widget: list
                collapsed: true
                required: false
                fields:
                  - { label: Título, name: title, widget: string }
                  - { label: Descripción, name: description, widget: text, required: false }
                  - { label: Imagen, name: image, widget: image, required: false }
                  - { label: Enlace, name: link, widget: string, required: false }
