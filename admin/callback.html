<!doctype html>
<html>
  <head><meta charset="utf-8" /><title>Autorizando...</title></head>
  <body>
    <script>
      (function () {
        var raw = decodeURIComponent((location.hash || '').slice(1));
        // raw = "authorization:github:success:{...}"

        if (raw && raw.indexOf('authorization:github:success:') === 0) {
          if (window.opener && !window.opener.closed) {
            // Mismo origen → postMessage sin restricciones
            window.opener.postMessage(raw, window.location.origin);
            setTimeout(function () { window.close(); }, 300);
            return;
          }
        }

        // Si no hay opener (acceso directo), vuelve al admin
        window.location.replace('/admin/');
      })();
    </script>
    <p>Autorizando, cierra esta ventana si no se cierra sola...</p>
  </body>
</html>
