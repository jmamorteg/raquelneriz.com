<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Static CMS | Raquel Neriz</title>
    <link
      rel="stylesheet"
      href="/assets/static-cms/app/main.css"
    />
    <script src="/assets/static-cms/app/static-cms-app.js" defer></script>
  </head>
  <body>
    <div id="nc-root"></div>
    <script>
      (function handleHashToken() {
        const raw = decodeURIComponent((location.hash || '').slice(1));
        const prefix = 'authorization:github:success:';
        if (raw && raw.startsWith(prefix)) {
          try {
            const payload = JSON.parse(raw.slice(prefix.length));
            if (payload && payload.token) {
              // Persist auth in the format Static CMS expects
              localStorage.removeItem('static-cms.user');
              localStorage.setItem(
                'static-cms-user',
                JSON.stringify({ backendName: 'github', token: payload.token })
              );
            }
          } catch (e) {
            console.error('No se pudo procesar el token en hash', e);
          }
          // Limpia el hash y recarga para re-inicializar Static CMS
          const cleanUrl = location.origin + location.pathname;
          location.replace(cleanUrl);
          window.location.reload();
        }
      })();

      document.addEventListener('DOMContentLoaded', function () {
        if (window.CMS) {
          CMS.init();
        } else {
          console.error('Static CMS no se cargó: revisa bloqueadores o el CDN.');
        }
      });
    </script>
  </body>
</html>
