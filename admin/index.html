<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Static CMS | Raquel Neriz</title>
    <link
      rel="stylesheet"
      href="/assets/static-cms/app/main.css"
    />
    <script id="static-cms-bundle" src="/assets/static-cms/app/static-cms-app.js" defer></script>
  </head>
  <body>
    <div id="nc-root"></div>
    <script>
      function persistCmsToken(token) {
        if (!token) {
          return;
        }

        localStorage.setItem('static-cms.user', JSON.stringify({ token: token }));
        localStorage.setItem(
          'static-cms-user',
          JSON.stringify({ backendName: 'github', token: token })
        );
      }

      function extractTokenFromOAuthHash(raw) {
        const prefix = 'authorization:github:success:';
        if (!raw || !raw.startsWith(prefix)) {
          return null;
        }

        const body = raw.slice(prefix.length);

        // Preferred payload from worker: JSON object in hash
        try {
          const json = JSON.parse(body);
          if (json && (json.token || json.access_token)) {
            return json.token || json.access_token;
          }
        } catch (e) {
          // Ignore and continue with other formats
        }

        // Fallback: query-string style payload
        try {
          const params = new URLSearchParams(body);
          const paramToken = params.get('token') || params.get('access_token');
          if (paramToken) {
            return paramToken;
          }
        } catch (e) {
          // Ignore and continue with direct token fallback
        }

        // Last resort: treat body as plain token text
        return body || null;
      }

      (function handleHashToken() {
        const raw = decodeURIComponent((location.hash || '').slice(1));
        const token = extractTokenFromOAuthHash(raw);
        if (token) {
          try {
            persistCmsToken(token);
          } catch (e) {
            console.error('No se pudo procesar el token en hash', e);
          }
          // Limpia el hash para evitar repetir el intercambio en recargas
          history.replaceState(null, '', location.pathname + location.search);
        }
      })();

      window.addEventListener('message', function (event) {
        if (event.origin !== location.origin) {
          return;
        }

        if (typeof event.data !== 'string') {
          return;
        }

        const token = extractTokenFromOAuthHash(event.data);
        if (!token) {
          return;
        }

        try {
          persistCmsToken(token);
          window.location.reload();
        } catch (e) {
          console.error('No se pudo persistir token desde callback', e);
        }
      });

      (function initCms() {
        var initialized = false;

        function start() {
          if (initialized) {
            return;
          }
          if (!window.CMS || typeof window.CMS.init !== 'function') {
            return;
          }

          initialized = true;
          window.CMS.init();
        }

        // Typical path for defer script: CMS is available by DOMContentLoaded.
        document.addEventListener('DOMContentLoaded', start);

        // Fallback path: if bundle loads later, initialize on load event.
        var bundle = document.getElementById('static-cms-bundle');
        if (bundle) {
          bundle.addEventListener('load', start);
        }

        // Last-resort polling for edge race conditions on mobile/webview browsers.
        var retries = 30;
        var timer = setInterval(function () {
          if (initialized || retries <= 0) {
            clearInterval(timer);
            return;
          }
          retries -= 1;
          start();
        }, 200);
      })();
    </script>
  </body>
</html>
