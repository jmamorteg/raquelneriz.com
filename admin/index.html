<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Static CMS | Raquel Neriz</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@staticcms/core@1.6.1/dist/static-cms.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@staticcms/core@1.6.1/dist/static-cms-app.js" defer></script>
  </head>
  <body>
    <div id="nc-root"></div>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        if (window.CMS) {
          CMS.init();
        } else {
          console.error('Static CMS no se cargó: revisa bloqueadores o el CDN.');
        }
      });
    </script>
  </body>
</html>
