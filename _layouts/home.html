<!DOCTYPE html>
<html lang="{{ site.lang | default: 'es' }}">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://use.typekit.net" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Maitree:wght@200&display=swap">
  <link rel="stylesheet" href="https://use.typekit.net/ssl2wkl.css">
  <style>
    body {
      margin: 0;
      background-color: #fffdfa;
    }

    .home-shell {
      position: relative;
      width: 100%;
      height: 100vh;
    }

    .home-center {
      position: absolute;
      left: calc(50% - 25vh + 0.5px);
      top: calc(50% - 25vh + 0.5px);
      width: 50vh;
      max-width: 92vw;
    }

    .home-logo {
      max-width: 50vh;
      max-height: 50vh;
      width: 100%;
      height: auto;
    }

    .under-construction {
      margin-left: 10vh;
      margin-bottom: 5px;
      font-family: "matrix-ii", serif;
      font-weight: 300;
      font-style: italic;
    }

    .contact-line {
      margin-left: 10vh;
      margin-top: 0;
      line-height: 14pt;
      font-family: "Maitree", serif;
      font-weight: 200;
    }

    .contact-line a,
    .contact-line a:visited {
      color: inherit;
    }

    @media (max-width: 680px) {
      .home-center {
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: min(88vw, 50vh);
      }

      .under-construction,
      .contact-line {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <main class="home-shell">
    <div class="home-center">
      <img class="home-logo" src="{{ '/assets/img/RN_logo.svg' | relative_url }}" alt="Raquel Neriz" />
      <p class="under-construction">mi página está en construcción</p>
      <p class="contact-line">
        pero, por ahora, me puedes encontrar en
        <a href="https://www.instagram.com/raquel.neriz/" target="_blank" rel="noopener noreferrer">Instagram</a>
        o escribirme a
        <a href="mailto:raquelarest@gmail.com?subject=Desde%20la%20web">raquelarest@gmail.com</a>
      </p>
    </div>
  </main>
</body>
</html>
